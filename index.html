<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMPN 1 Bangilan — Sekolah Unggulan Tuban</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d0d;
    --ink-soft: #1c1c1c;
    --paper: #f5f0e8;
    --paper-dark: #ede7d8;
    --gold: #c8922a;
    --gold-light: #e8b450;
    --gold-pale: rgba(200, 146, 42, 0.12);
    --slate: #2a3547;
    --slate-mid: #3d4f6a;
    --mist: rgba(13,13,13,0.06);
    --white: #ffffff;
    --gray: #7a7a7a;
    --gray-light: #b0a898;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor-dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 99999;
    transition: transform 0.15s ease;
    top: 0; left: 0;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 99998;
    transition: transform 0.08s ease, width 0.2s, height 0.2s, opacity 0.2s;
    top: 0; left: 0;
    opacity: 0.6;
  }
  body:hover .cursor-ring { opacity: 1; }

  /* NOISE TEXTURE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ─── NAVBAR ─── */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 64px;
    transition: all 0.4s ease;
  }
  nav.scrolled {
    background: rgba(245, 240, 232, 0.92);
    backdrop-filter: blur(20px);
    padding: 14px 64px;
    border-bottom: 1px solid rgba(200,146,42,0.2);
    box-shadow: 0 2px 40px rgba(0,0,0,0.06);
  }

  .logo-mark {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-emblem {
    width: 42px; height: 42px;
    background: var(--ink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .logo-emblem::before {
    content: '';
    position: absolute; inset: 3px;
    border: 1px solid var(--gold);
    border-radius: 50%;
  }
  .logo-emblem::after {
    content: '✦';
    color: var(--gold);
    font-size: 1rem;
  }
  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }
  .logo-text small {
    display: block;
    font-family: 'Outfit', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 1px;
  }

  .nav-links { display: flex; gap: 36px; list-style: none; align-items: center; }
  .nav-links a {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    position: relative;
    transition: color 0.25s;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -3px; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width 0.3s ease;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a:hover::after { width: 100%; }

  .nav-cta {
    background: var(--ink) !important;
    color: var(--paper) !important;
    padding: 10px 24px !important;
    border-radius: 2px;
    letter-spacing: 1px !important;
  }
  .nav-cta::after { display: none !important; }
  .nav-cta:hover { background: var(--gold) !important; color: var(--ink) !important; }

  /* ─── DROPDOWN NAV ─── */
  .nav-links li { position: relative; }
  .nav-links li.has-dropdown > a::after { content: none; }
  .nav-links li.has-dropdown > a .drop-arrow {
    display: inline-block;
    margin-left: 5px;
    font-size: 0.55rem;
    transition: transform 0.25s;
    vertical-align: middle;
  }
  .nav-links li.has-dropdown:hover > a .drop-arrow { transform: rotate(180deg); }

  .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 14px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--white);
    border: 1px solid rgba(200,146,42,0.15);
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    min-width: 220px;
    z-index: 2000;
    padding: 8px 0;
    animation: dropIn 0.2s ease;
  }
  @keyframes dropIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  .nav-links li.has-dropdown:hover .dropdown { display: block; }
  .dropdown a {
    display: block;
    padding: 10px 20px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: none;
    color: var(--ink);
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    border-left: 2px solid transparent;
  }
  .dropdown a::after { display: none !important; }
  .dropdown a:hover { background: var(--gold-pale); color: var(--gold); border-left-color: var(--gold); }
  .dropdown-divider { height: 1px; background: rgba(0,0,0,0.06); margin: 4px 0; }
  .dropdown-label {
    display: block;
    padding: 8px 20px 4px;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ─── STRUKTUR ORGANISASI ─── */
  .struktur { padding: 120px 64px; background: var(--paper-dark); }
  .struktur-box {
    margin-top: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
  }
  .org-tier { display: flex; justify-content: center; gap: 16px; margin-bottom: 0; position: relative; width: 100%; }
  .org-connector-v {
    width: 2px; height: 40px;
    background: linear-gradient(to bottom, var(--gold), rgba(200,146,42,0.3));
    margin: 0 auto;
  }
  .org-connector-h {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    height: 2px;
    background: rgba(200,146,42,0.3);
    z-index: 0;
  }
  .org-card {
    background: var(--white);
    border: 1px solid rgba(200,146,42,0.2);
    border-radius: 6px;
    padding: 20px 28px;
    text-align: center;
    position: relative;
    transition: all 0.3s;
    min-width: 160px;
    z-index: 1;
  }
  .org-card:hover { box-shadow: 0 8px 30px rgba(200,146,42,0.15); transform: translateY(-3px); border-color: var(--gold); }
  .org-card.kepala { background: var(--ink); border-color: var(--gold); }
  .org-card.kepala .org-name { color: var(--white); }
  .org-card.kepala .org-jabatan { color: var(--gold); }
  .org-card.wakil { background: var(--slate); border-color: var(--gold); }
  .org-card.wakil .org-name { color: var(--white); font-size: 0.82rem; }
  .org-card.wakil .org-jabatan { color: var(--gold-light); }
  .org-avatar { font-size: 2rem; margin-bottom: 8px; }
  .org-jabatan { font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .org-name { font-size: 0.88rem; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .org-tier-label {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(200,146,42,0.5); position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  }

  /* ─── SARANA & PRASARANA ─── */
  .sarpras { padding: 120px 64px; background: var(--paper); }
  .sarpras-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 60px;
  }
  .sarpras-card {
    background: var(--white);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 6px;
    padding: 32px 24px;
    text-align: center;
    transition: all 0.3s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .sarpras-card::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.3s;
    transform-origin: left;
  }
  .sarpras-card:hover::before { transform: scaleX(1); }
  .sarpras-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.08); transform: translateY(-4px); }
  .sarpras-icon { font-size: 2.2rem; margin-bottom: 14px; }
  .sarpras-name { font-size: 0.9rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .sarpras-count { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: var(--gold); }
  .sarpras-unit { font-size: 0.7rem; color: var(--gray); letter-spacing: 1px; }

  /* ─── KELULUSAN ─── */
  .kelulusan { padding: 120px 64px; background: var(--ink); position: relative; overflow: hidden; }
  .kelulusan::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(200,146,42,0.07) 0%, transparent 70%);
  }
  .kelulusan-inner { position: relative; z-index: 1; }
  .kelulusan-grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 80px;
    align-items: center;
    margin-top: 60px;
  }
  .kelulusan-stat-big {
    text-align: center;
    background: rgba(200,146,42,0.08);
    border: 1px solid rgba(200,146,42,0.2);
    border-radius: 8px;
    padding: 48px 32px;
  }
  .kel-pct {
    font-family: 'Cormorant Garamond', serif;
    font-size: 5rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .kel-label { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 12px; }
  .kelulusan-tahun { display: flex; flex-direction: column; gap: 16px; }
  .kel-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .kel-year { font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.4); width: 80px; flex-shrink: 0; }
  .kel-bar-wrap { flex: 1; background: rgba(255,255,255,0.06); border-radius: 20px; overflow: hidden; height: 8px; }
  .kel-bar { height: 100%; border-radius: 20px; background: var(--gold); transition: width 1.5s ease; }
  .kel-pct-small { font-size: 0.85rem; font-weight: 700; color: var(--gold); width: 50px; text-align: right; flex-shrink: 0; }
  .kel-search-box {
    margin-top: 48px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,146,42,0.2);
    border-radius: 6px;
    padding: 28px;
  }
  .kel-search-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .kel-search-row { display: flex; gap: 12px; }
  .kel-input {
    flex: 1; padding: 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,146,42,0.2);
    border-radius: 4px;
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .kel-input::placeholder { color: rgba(255,255,255,0.25); }
  .kel-input:focus { border-color: var(--gold); }
  .kel-btn {
    padding: 12px 24px;
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 4px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: none;
    transition: background 0.2s, transform 0.2s;
  }
  .kel-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .kel-result { margin-top: 16px; font-size: 0.85rem; color: rgba(255,255,255,0.5); min-height: 24px; }

  /* ─── BURSA KERJA ─── */
  .bursa { padding: 120px 64px; background: var(--paper-dark); }
  .bursa-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 60px;
  }
  .bursa-card {
    background: var(--white);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 6px;
    padding: 32px;
    transition: all 0.3s;
    cursor: pointer;
    position: relative;
  }
  .bursa-card:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.1); transform: translateY(-4px); border-color: rgba(200,146,42,0.3); }
  .bursa-badge {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 16px;
  }
  .badge-buka { background: #d1fae5; color: #065f46; }
  .badge-tutup { background: #fee2e2; color: #991b1b; }
  .badge-segera { background: #fef3c7; color: #92400e; }
  .bursa-company { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .bursa-posisi { font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 12px; line-height: 1.3; }
  .bursa-info { font-size: 0.8rem; color: var(--gray); line-height: 1.6; margin-bottom: 20px; }
  .bursa-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .bursa-tag { font-size: 0.7rem; background: var(--paper-dark); padding: 4px 10px; border-radius: 12px; color: var(--gray); font-weight: 500; }
  .bursa-apply {
    display: inline-block;
    padding: 10px 20px;
    background: var(--ink);
    color: var(--paper);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 2px;
    text-decoration: none;
    transition: background 0.2s;
  }
  .bursa-apply:hover { background: var(--gold); color: var(--ink); }
  .bursa-cta-box {
    margin-top: 48px;
    padding: 40px;
    background: var(--ink);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
  }
  .bursa-cta-text h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--white); margin-bottom: 8px; }
  .bursa-cta-text p { font-size: 0.88rem; color: rgba(255,255,255,0.4); }
  .bursa-cta-btn {
    display: inline-block;
    padding: 14px 32px;
    background: var(--gold);
    color: var(--ink);
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 2px;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .bursa-cta-btn:hover { background: var(--gold-light); }

  /* ─── E-APLIKASI ─── */
  .eapp { padding: 120px 64px; background: var(--paper); }
  .eapp-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    margin-top: 60px;
  }
  .eapp-card {
    border-radius: 8px;
    padding: 48px 36px;
    text-align: center;
    text-decoration: none;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    display: block;
    cursor: none;
  }
  .eapp-card:hover { transform: translateY(-6px); }
  .eapp-card.elearn { background: linear-gradient(135deg, #1e3a5f 0%, var(--slate) 100%); }
  .eapp-card.eppdb { background: linear-gradient(135deg, var(--ink) 0%, #2d3748 100%); }
  .eapp-card.eperpus { background: linear-gradient(135deg, #3d2b0a 0%, #5c3d10 100%); }
  .eapp-card::before {
    content: '';
    position: absolute;
    top: -50%; right: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(200,146,42,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .eapp-icon { font-size: 3rem; margin-bottom: 20px; position: relative; z-index: 1; }
  .eapp-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 700;
    color: var(--white); margin-bottom: 12px;
    position: relative; z-index: 1;
  }
  .eapp-desc { font-size: 0.85rem; color: rgba(255,255,255,0.45); line-height: 1.7; position: relative; z-index: 1; margin-bottom: 28px; }
  .eapp-btn {
    display: inline-block;
    padding: 10px 24px;
    border: 1px solid rgba(200,146,42,0.5);
    color: var(--gold);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.2s;
    position: relative; z-index: 1;
  }
  .eapp-card:hover .eapp-btn { background: var(--gold); color: var(--ink); border-color: var(--gold); }

  /* ─── LOGIN MODAL ─── */
  .login-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(12px);
    z-index: 99000;
    align-items: center;
    justify-content: center;
  }
  .login-modal.open { display: flex; }
  .login-box {
    background: var(--white);
    border-radius: 8px;
    width: 420px;
    max-width: 90vw;
    padding: 48px 40px;
    position: relative;
    animation: dropIn2 0.3s ease;
  }
  @keyframes dropIn2 {
    from { opacity: 0; transform: translateY(-20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .login-close {
    position: absolute; top: 20px; right: 20px;
    background: none; border: none; font-size: 1.2rem;
    cursor: none; color: var(--gray); transition: color 0.2s;
  }
  .login-close:hover { color: var(--ink); }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .logo-emblem { margin: 0 auto 10px; }
  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 700;
    text-align: center; color: var(--ink);
    margin-bottom: 6px;
  }
  .login-sub { font-size: 0.8rem; color: var(--gray); text-align: center; margin-bottom: 32px; }
  .login-role-tabs { display: flex; gap: 8px; margin-bottom: 28px; }
  .login-tab {
    flex: 1; padding: 10px;
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 4px;
    background: none; cursor: none;
    color: var(--gray);
    transition: all 0.2s;
  }
  .login-tab.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .login-fgroup { margin-bottom: 16px; }
  .login-fgroup label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
  .login-fgroup input {
    width: 100%; padding: 12px 16px;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 4px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: var(--paper);
    outline: none;
    transition: border-color 0.2s;
  }
  .login-fgroup input:focus { border-color: var(--gold); }
  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: 4px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: none;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .login-btn:hover { background: var(--gold); color: var(--ink); }
  .login-forgot { text-align: center; margin-top: 16px; font-size: 0.8rem; color: var(--gray); }
  .login-forgot a { color: var(--gold); text-decoration: none; }

  /* HAMBURGER */
  .hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: none; background: none; border: none; padding: 4px; z-index: 200;

  /* ─── HERO ─── */

  .hero::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;

    clip-path: polygon(8% 0, 100% 0, 100% 100%, 0% 100%);

    background-size: 80px 80px;

  .hero h1 {

  .hero-desc {

  .hero-btns {

  .btn-gold {

  /* ─── MARQUEE BAND ─── */
